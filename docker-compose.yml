services:
  openocd:
    build:
      context: .
      dockerfile: docker/Dockerfile.windows-cross
      args:
        CONFIGURE_FLAGS: ${CONFIGURE_FLAGS:---enable-ftdi --enable-stlink --enable-cmsis-dap --enable-jlink --enable-jimtcl-maintainer --enable-internal-jimtcl --disable-werror}
    container_name: openocd
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      # Use the repository-level config/examples directories by default.
      # The entrypoint adds /work as an OpenOCD script search root, so
      # "-f config/default.cfg" resolves to /work/config/default.cfg.
      - ./config:/work/config:ro
      - ./examples:/work/examples:ro
      # Package output directory used by the Windows cross-build helper.
      - ./docker/data/dist:/out
    ports:
      - "3333:3333" # GDB
      - "4444:4444" # Telnet
      - "6666:6666" # Tcl
    environment:
      OPENOCD_BINDTO: 0.0.0.0
      OPENOCD_WORK_SCRIPT_DIR: /work
    command:
      - -f
      - config/default.cfg
