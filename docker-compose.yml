# Docker Compose is used here only as a binary package builder.
# It does not run OpenOCD and it does not expose USB/JTAG devices.
#
# Default Windows/amd64 Docker Desktop build:
#   docker compose up --build
#
# This default builds only native linux/amd64 plus the Windows cross package.
# linux/arm64 is behind the optional "arm64" profile because it requires
# working QEMU/binfmt emulation on non-arm64 hosts.
#
# Optional ARM64 build when emulation is installed:
#   docker run --privileged --rm tonistiigi/binfmt --install arm64
#   docker compose --profile arm64 up --build
#
# For direct Buildx local export without running containers, use:
#   docker buildx bake            # default/native set
#   docker buildx bake all        # includes linux/arm64

x-common-args: &common_args
  CONFIGURE_FLAGS: ${CONFIGURE_FLAGS:---enable-ftdi --enable-stlink --enable-cmsis-dap --enable-jlink --enable-jimtcl-maintainer --enable-internal-jimtcl}
  JOBS: ${JOBS:-0}

services:
  linux-amd64:
    image: openocd-package-linux-amd64
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile.linux-package
      target: package
      args: *common_args
    volumes:
      - ./docker/data/dist/linux/amd64:/dist

  # Optional on amd64 Windows/Linux hosts. Requires QEMU/binfmt emulation.
  linux-arm64:
    profiles: ["arm64"]
    image: openocd-package-linux-arm64
    platform: linux/arm64
    build:
      context: .
      dockerfile: docker/Dockerfile.linux-package
      target: package
      args: *common_args
    volumes:
      - ./docker/data/dist/linux/arm64:/dist

  windows-x86_64:
    image: openocd-package-windows-x86_64
    build:
      context: .
      dockerfile: docker/Dockerfile.windows-cross
      target: package
      args: *common_args
    volumes:
      - ./docker/data/dist/windows:/dist
