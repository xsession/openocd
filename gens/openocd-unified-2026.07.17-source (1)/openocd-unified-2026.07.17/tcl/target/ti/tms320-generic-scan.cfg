#
# Generic TI TMS320 JTAG TAP declaration for CCS-derived metadata targets.
# Device-specific files may override TMS320_IRLEN/TMS320_TAPID before sourcing.

if { ![info exists CHIPNAME] } {
	error "CHIPNAME must be set before target/ti/tms320-generic-scan.cfg"
}

if { ![info exists TMS320_IRLEN] } {
	set TMS320_IRLEN 6
}

set _TMS320_CHIPNAME $CHIPNAME
set _TMS320_TAP $_TMS320_CHIPNAME.tms320
set _tms320_newtap [list jtag newtap $_TMS320_CHIPNAME tms320 \
	-irlen $TMS320_IRLEN -ircapture 0x1 -irmask 0x3]

if { [info exists TMS320_TAPID] } {
	lappend _tms320_newtap -expected-id $TMS320_TAPID
}

eval $_tms320_newtap
set TMS320_GENERIC_TAP_NAME $_TMS320_TAP
