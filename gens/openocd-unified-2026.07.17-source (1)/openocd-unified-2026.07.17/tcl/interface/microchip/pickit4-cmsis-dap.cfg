#
# MPLAB PICkit 4 as a standard CMSIS-DAP adapter.
#
# This applies only when the tool firmware exposes the CMSIS-DAP interface
# required by the target family/mode. It is separate from PIC/dsPIC ICSP
# programming; use programmer/microchip/pickit4.cfg for that workflow.

adapter driver cmsis-dap
cmsis_dap_backend hid
adapter usb vid_pid 0x03eb 0x2177
