#
# Texas Instruments F28M35x Concerto target configuration.
#
# F28M35x combines Cortex-M3 and C28x subsystems behind a TI ICEPick router.
# This file exposes the external router and creates a C28x target command
# endpoint.  Board files may override C28X_CHAIN_POSITION after routing the
# correct secondary TAP.

if { ![info exists CHIPNAME] } {
	set CHIPNAME tms320f28m35x
}

set C2000_DEVICE_FAMILY F28M35x
set C2000_CPU_ARCH cortex_m3_and_c28x
set C2000_FLASH_BYTES variant_dependent
set C2000_RAM_BYTES variant_dependent

source [find target/ti/c2000-icepick-scan.cfg]

if { ![info exists TARGETNAME] } {
	set TARGETNAME ${CHIPNAME}.c28x
}

if { ![info exists C28X_CHAIN_POSITION] } {
	set C28X_CHAIN_POSITION $C2000_ICEPICK_TAP_NAME
}

target create $TARGETNAME c28x -chain-position $C28X_CHAIN_POSITION
targets $TARGETNAME
c28x device F28M35x-C28x
c28x procid 0x5000A3F8
c28x icepick_port 0x11
c28x gel_file ../../emulation/gel/f28m35h52c1_c28.gel
