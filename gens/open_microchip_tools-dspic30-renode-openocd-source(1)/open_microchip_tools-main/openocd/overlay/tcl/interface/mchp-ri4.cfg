# Host-side bridge defaults.
#
# OpenOCD requires each target to be attached to a transport/TAP.  The actual
# target transport for this driver is the newline-JSON bridge, not JTAG, so a
# dummy adapter and virtual TAP are used only to satisfy OpenOCD's target model.
adapter driver dummy
transport select jtag

# Never scan the synthetic TAP.  Target reset is implemented by the
# mchp_ri4_bridge target callbacks and is forwarded to PICkit/ICD4 or Renode.
# These procedures intentionally replace OpenOCD's default JTAG startup/reset
# scans for configurations that source this interface.
proc jtag_init {} {
    # Virtual bridge transport: no physical scan chain to initialize.
}
proc init_reset {mode} {
    # Virtual bridge transport: reset is forwarded by target callbacks.
}

if {![info exists MCHP_RI4_HOST]} { set MCHP_RI4_HOST 127.0.0.1 }
if {![info exists MCHP_RI4_PORT]} { set MCHP_RI4_PORT 9123 }
if {![info exists MCHP_RI4_TOOL]} { set MCHP_RI4_TOOL pk4 }
if {![info exists MCHP_RI4_VID]} { set MCHP_RI4_VID 0x04d8 }
if {![info exists MCHP_RI4_PID]} { set MCHP_RI4_PID 0x9012 }
if {![info exists MCHP_RI4_SERIAL]} { set MCHP_RI4_SERIAL "" }
