#
# TI C2000 ICEPick-C JTAG discovery support.
#
# This script creates the external ICEPick TAP and provides non-destructive
# ID/secondary-TAP discovery helpers.  Device target files create the C28x
# OpenOCD target separately and annotate it with CCS-derived ProcID and
# ICEPick port metadata.
#
# Required before sourcing:
#   CHIPNAME                 OpenOCD chip name
# Optional:
#   C2000_ICEPICK_IRLEN      Defaults to 6 for ICEPick-C
#   C2000_ICEPICK_TAPID      Exact expected external IDCODE

if { ![info exists CHIPNAME] } {
	error "CHIPNAME must be set before target/ti/c2000-icepick-scan.cfg"
}

if { ![info exists C2000_ICEPICK_IRLEN] } {
	set C2000_ICEPICK_IRLEN 6
}

set _C2000_CHIPNAME $CHIPNAME
set _C2000_ICEPICK_TAP $_C2000_CHIPNAME.icepick

set _c2000_newtap [list jtag newtap $_C2000_CHIPNAME icepick \
	-irlen $C2000_ICEPICK_IRLEN -ircapture 0x1 -irmask 0x3]

if { [info exists C2000_ICEPICK_TAPID] } {
	lappend _c2000_newtap -expected-id $C2000_ICEPICK_TAPID
}

eval $_c2000_newtap

set C2000_ICEPICK_TAP_NAME $_C2000_ICEPICK_TAP

# ICEPick-C instruction opcodes from TI SPRUH35.
set C2000_ICEPICK_ROUTER_OPCODE 0x02
set C2000_ICEPICK_IDCODE_OPCODE 0x04
set C2000_ICEPICK_CODE_OPCODE 0x05
set C2000_ICEPICK_CONNECT_OPCODE 0x07

proc c2000_icepick_connect {} {
	global C2000_ICEPICK_TAP_NAME
	global C2000_ICEPICK_CONNECT_OPCODE

	# WRITEENABLE=1 and CONNECTKEY=1001b.
	irscan $C2000_ICEPICK_TAP_NAME $C2000_ICEPICK_CONNECT_OPCODE
	drscan $C2000_ICEPICK_TAP_NAME 8 0x89
	return 0
}

proc c2000_icepick_read_idcode {} {
	global C2000_ICEPICK_TAP_NAME
	global C2000_ICEPICK_IDCODE_OPCODE

	irscan $C2000_ICEPICK_TAP_NAME $C2000_ICEPICK_IDCODE_OPCODE
	set value [drscan $C2000_ICEPICK_TAP_NAME 32 0]
	echo [format "ICEPick device IDCODE: 0x%08x" $value]
	return $value
}

proc c2000_icepick_read_code {} {
	global C2000_ICEPICK_TAP_NAME
	global C2000_ICEPICK_CODE_OPCODE

	irscan $C2000_ICEPICK_TAP_NAME $C2000_ICEPICK_CODE_OPCODE
	set value [drscan $C2000_ICEPICK_TAP_NAME 32 0]
	echo [format "ICEPick identification code: 0x%08x" $value]
	return $value
}

proc c2000_icepick_router_read {reg} {
	global C2000_ICEPICK_TAP_NAME
	global C2000_ICEPICK_ROUTER_OPCODE

	if { $reg < 0 || $reg > 0x7f } {
		error "ICEPick mapped-register index must be in range 0..0x7f"
	}

	c2000_icepick_connect
	irscan $C2000_ICEPICK_TAP_NAME $C2000_ICEPICK_ROUTER_OPCODE

	# A ROUTER read is pipelined. Submit the request, then perform a second
	# scan to collect the response. Bits 30:24 carry the register index.
	set request [expr {($reg & 0x7f) << 24}]
	drscan $C2000_ICEPICK_TAP_NAME 32 $request
	set response [drscan $C2000_ICEPICK_TAP_NAME 32 0]
	return [expr {$response & 0x00ffffff}]
}

proc c2000_icepick_router_write {reg data} {
	global C2000_ICEPICK_TAP_NAME
	global C2000_ICEPICK_ROUTER_OPCODE

	if { $reg < 0 || $reg > 0x7f } {
		error "ICEPick mapped-register index must be in range 0..0x7f"
	}
	if { $data < 0 || $data > 0x00ffffff } {
		error "ICEPick mapped-register data must be in range 0..0xffffff"
	}

	c2000_icepick_connect
	irscan $C2000_ICEPICK_TAP_NAME $C2000_ICEPICK_ROUTER_OPCODE
	set request [expr {0x80000000 | (($reg & 0x7f) << 24) | $data}]
	drscan $C2000_ICEPICK_TAP_NAME 32 $request
	set response [drscan $C2000_ICEPICK_TAP_NAME 32 0]

	if { ($response & 0x80000000) != 0 } {
		error [format "ICEPick mapped-register write failed: response=0x%08x" $response]
	}
	return [expr {$response & 0x00ffffff}]
}

proc c2000_icepick_scan_sdtaps {} {
	set present {}
	for {set index 0} {$index < 16} {incr index} {
		set value [c2000_icepick_router_read [expr {0x20 + $index}]]
		set is_present [expr {$value & 1}]
		set is_accessible [expr {($value >> 1) & 1}]
		set is_selected [expr {($value >> 8) & 1}]
		echo [format "SDTAP%-2d present=%d accessible=%d selected=%d raw=0x%06x" \
			$index $is_present $is_accessible $is_selected $value]
		if { $is_present } {
			lappend present $index
		}
	}
	return $present
}

proc c2000_support_status {} {
	global CHIPNAME
	echo "Target: $CHIPNAME"
	echo "Available now: ICEPick IDCODE, ICEPick code, secondary-TAP discovery and C28x OpenOCD target creation"
	echo "C28x halt/resume/register/memory operations still require verified TI debug transport packets"
	echo "Run after init: c2000_icepick_read_idcode; c2000_icepick_read_code; c2000_icepick_scan_sdtaps"
}
