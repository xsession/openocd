#
# Texas Instruments TMS320F28069 Piccolo target configuration.
#
# This file creates the external ICEPick-C TAP and a C28x OpenOCD target.  The
# C28x backend is present, but the private C28x core debug opcodes are disabled
# until board/silicon-verified values are supplied with the `c28x ir ...`
# commands.

if { ![info exists CHIPNAME] } {
	set CHIPNAME tms320f28069
}

if { ![info exists CPUTAPID] } {
	# Keep unset by default because TI C2000 ICEPick IDCODEs are package/family
	# dependent. Users may pass `-c "set CPUTAPID 0x..."` once known.
}

if { ![info exists C2000_ICEPICK_TAPID] } {
	set C2000_ICEPICK_TAPID 0x0b95302f
}

if { ![info exists C2000_ICEPICK_IRCAPTURE] } {
	set C2000_ICEPICK_IRCAPTURE 0x09
}

if { ![info exists C2000_ICEPICK_IRMASK] } {
	set C2000_ICEPICK_IRMASK 0x0f
}

if { ![info exists C2000_VERIFY_IRCAPTURE] } {
	# LAUNCHXL-F28069M/XDS100v2 returns the ICEPick IDCODE correctly, but the
	# visible router path does not return OpenOCD's generic trailing IR
	# sentinel. Keep IDCODE validation active and skip only Capture-IR startup
	# validation unless the caller opts back in.
	set C2000_VERIFY_IRCAPTURE 0
}

if { !$C2000_VERIFY_IRCAPTURE } {
	verify_ircapture disable
}

set C2000_DEVICE_FAMILY F2806x
set C2000_CPU_ARCH c28x
set C2000_FLASH_BYTES 0x00040000
set C2000_RAM_BYTES 0x00019000

source [find target/ti/c2000-icepick-scan.cfg]

if { ![info exists TARGETNAME] } {
	set TARGETNAME ${CHIPNAME}.cpu
}

if { ![info exists C28X_CHAIN_POSITION] } {
	# Until the C28x secondary TAP is routed, bind the target to the visible
	# ICEPick TAP so OpenOCD can create the target and expose C28x commands.
	set C28X_CHAIN_POSITION $C2000_ICEPICK_TAP_NAME
}

target create $TARGETNAME c28x -chain-position $C28X_CHAIN_POSITION
targets $TARGETNAME
c28x device TMS320F28069
c28x procid 0x5000A3F8
c28x gel_file ../../emulation/gel/f28069.gel
