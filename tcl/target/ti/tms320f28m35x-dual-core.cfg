#
# Texas Instruments F28M35x Concerto dual-core target configuration.
#
# This opt-in configuration exposes both debug endpoints behind the visible
# ICEPick-C router:
#
#   tms320f28m35x.m3    Cortex-M3, ICEPick subpath port 0x10
#   tms320f28m35x.c28x  C28x,      ICEPick subpath port 0x11
#
# The existing target/ti/tms320f28m35x.cfg remains the conservative C28x-only
# configuration that was first validated on hardware.

if { ![info exists CHIPNAME] } {
	set CHIPNAME tms320f28m35x
}

set C2000_DEVICE_FAMILY F28M35x
set C2000_CPU_ARCH cortex_m3_and_c28x
set C2000_FLASH_BYTES variant_dependent
set C2000_RAM_BYTES variant_dependent

source [find target/ti/c2000-icepick-scan.cfg]
source [find target/ti/icepick.cfg]

if { ![info exists F28M35X_M3_ICEPICK_PORT] } {
	set F28M35X_M3_ICEPICK_PORT 0x10
}

if { ![info exists F28M35X_C28X_ICEPICK_PORT] } {
	set F28M35X_C28X_ICEPICK_PORT 0x11
}

if { ![info exists M3_TAPID] } {
	set M3_TAPID 0x4ba00477
}

if { ![info exists F28M35X_M3_AP_NUM] } {
	set F28M35X_M3_AP_NUM 2
}

if { ![info exists F28M35X_M3_AUTO_ENABLE] } {
	set F28M35X_M3_AUTO_ENABLE 0
}

set F28M35X_M3_TAP ${CHIPNAME}.m3tap
set F28M35X_M3_DAP ${CHIPNAME}.m3dap
set F28M35X_M3_TARGET ${CHIPNAME}.m3
set F28M35X_C28X_TARGET ${CHIPNAME}.c28x

jtag newtap $CHIPNAME m3tap -irlen 4 -ircapture 0x1 -irmask 0xf \
	-expected-id $M3_TAPID -disable
jtag configure $F28M35X_M3_TAP -event tap-enable \
	"icepick_c_tapenable $C2000_ICEPICK_TAP_NAME $F28M35X_M3_ICEPICK_PORT"

if { $F28M35X_M3_AUTO_ENABLE } {
	jtag configure $C2000_ICEPICK_TAP_NAME -event setup \
		"jtag tapenable $F28M35X_M3_TAP"
}

dap create $F28M35X_M3_DAP -chain-position $F28M35X_M3_TAP
target create $F28M35X_M3_TARGET cortex_m -dap $F28M35X_M3_DAP \
	-ap-num $F28M35X_M3_AP_NUM -defer-examine
$F28M35X_M3_TARGET configure -rtos auto
cortex_m reset_config sysresetreq

target create $F28M35X_C28X_TARGET c28x -chain-position $C2000_ICEPICK_TAP_NAME
c28x device F28M35x-C28x
c28x procid 0x5000A3F8
c28x icepick_port $F28M35X_C28X_ICEPICK_PORT
c28x gel_file ../../emulation/gel/f28m35h52c1_c28.gel
