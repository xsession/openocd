source [find bitsbytes.tcl]

# Device info
if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME cc35x1e
}

if { [info exists CPUTAPID] } {
	set _DAP_TAPID $CPUTAPID
} else {
	set _DAP_TAPID 0x0BB9602F
}

if { [info exists DAP_SWD_ID] } {
	set _DAP_SWD_ID $DAP_SWD_ID
} else {
	set _DAP_SWD_ID 0x0BB9602F
}

source [find target/swj-dp.tcl]

if { [using_jtag] } {
	set _DAP_ID $_DAP_TAPID
} else {
	set _DAP_ID $_DAP_SWD_ID
}

# Create and add DAP and target
swj_newdap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_ID

dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME cortex_m  -dap $_CHIPNAME.dap

# Soft reset configuration (?)
cortex_m reset_config sysresetreq

gdb breakpoint_override none

gdb report_register_access_error enable

gdb target_description enable

# Post init commands
lappend post_init_commands {echo "Open OCD for CC35x1e device successfully initialized."}

# Check if D-cache is properly configured
# This validates that the cache address range (CAH - CAL) is valid
# Aligned with CC35X1E_M33.gel isDCACHEconfigured()
proc is_dcache_configured {} {
	set DCACHE_REGS 0x41902400
	set OFFSET_CAL 0x00000010
	set OFFSET_CAH 0x00000018

	set cal_val [read_memory [expr {$DCACHE_REGS + $OFFSET_CAL}] 32 1]
	set cah_val [read_memory [expr {$DCACHE_REGS + $OFFSET_CAH}] 32 1]

	# puts [format "  CAL (Cache Address Low):  0x%08x" $cal_val]
	# puts [format "  CAH (Cache Address High): 0x%08x" $cah_val]

	if {[expr {($cah_val - $cal_val) <= 0}]} {
		# puts "WARNING: D-cache not properly configured (CAH - CAL <= 0)"
		return 0
	}

	return 1
}

# Enable D-cache by setting bit 31 of DCACHE CTRL register
# Aligned with CC35X1E_M33.gel enableDcache()
proc enable_dcache {} {
	if {![is_dcache_configured]} {
		# puts "WARNING: Skipping D-cache enable - cache not configured"
		return
	}

	set DCACHE_REGS 0x41902400
	set OFFSET_CTRL 0x00000004

	set ctrl_addr [expr {$DCACHE_REGS + $OFFSET_CTRL}]
	# puts [format "  CTRL ADDRESS:    0x%08x" $ctrl_addr]

	set ctrl_val [read_memory  $ctrl_addr 32 1]
	# puts [format "  CTRL VAL BEFORE:    0x%08x" $ctrl_val]

	if {[expr {!($ctrl_val & 0x80000000)}]} {
		# puts "*************** Enabling DCACHE ***************"

		set ctrl_val [expr {$ctrl_val | 0x80000000}]
		# puts [format "  CALC CTRL VAL:    0x%08x" $ctrl_val]

		write_memory $ctrl_addr 32 $ctrl_val

		set ctrl_val [read_memory $ctrl_addr 32 1]
		# puts [format "  CTRL VAL AFTER:    0x%08x" $ctrl_val]

		# puts "*************** DCACHE Enabled ***************"
	} else {
		# puts "*************** DCACHE Already Enabled ***************"
	}
}

# Disable D-cache with flush and invalidate sequence
# Aligned with CC35X1E_M33.gel disableDcache(), flushDCACHE(), invalidateDCACHE()
proc disable_dcache {} {
	if {![is_dcache_configured]} {
		# puts "WARNING: Skipping D-cache disable - cache not configured"
		return
	}

	set DCACHE_REGS 0x41902400
	set OFFSET_CTRL 0x00000004
	set OFFSET_CTRL1 0x000000C0
	set OFFSET_STATUS1 0x000000C4

	set ctrl [read_memory [expr {$DCACHE_REGS + $OFFSET_CTRL}] 32 1]
	# puts [format "  DCACHE CTRL current value: 0x%08x" $ctrl]

	if {[expr {$ctrl & 0x80000000}]} {
		# D-cache is enabled (bit 31 set), proceed with disable sequence
		# puts "*************** Disabling DCACHE ***************"

		# Step 1: Flush D-cache (write dirty lines back to memory)
		# puts "Flushing DCACHE..."
		write_memory [expr {$DCACHE_REGS + $OFFSET_CTRL1}] 32 {0x80000000}

		set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
		# puts [format "  DCACHE Status: 0x%08x" $status1]

		# Wait for flush complete (bit 29 or 31)
		while {([expr {!($status1 & 0x20000000)}]) && ([expr {!($status1 & 0x80000000)}])} {
			set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
			# puts [format "  DCACHE Status: 0x%08x" $status1]
		}

		set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
		# puts [format "  Flush Done - Status: 0x%08x" $status1]

		# Step 2: Invalidate D-cache (mark all lines invalid)
		# puts "Invalidating DCACHE..."
		write_memory [expr {$DCACHE_REGS + $OFFSET_CTRL1}] 32 {0x40000000}

		set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
		# puts [format "  Invalidate Status: 0x%08x" $status1]

		# Wait for invalidate complete (bit 30)
		while {([expr {!($status1 & 0x40000000)}])} {
			set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
			# puts [format "  Invalidate Status: 0x%08x" $status1]
		}

		set status1 [read_memory [expr {$DCACHE_REGS + $OFFSET_STATUS1}] 32 1]
		# puts [format "  Invalidate Done - Status: 0x%08x" $status1]

		# Step 3: Clear enable bit (bit 31) in CTRL register
		set ctrl [read_memory [expr {$DCACHE_REGS + $OFFSET_CTRL}] 32 1]
		# puts [format "  DCACHE CTRL updated value: 0x%08x" $ctrl]

		set ctrl [expr {$ctrl & 0x7FFFFFFF}]
		# puts [format "  DCACHE CTRL set value: 0x%08x" $ctrl]

		write_memory [expr {$DCACHE_REGS + $OFFSET_CTRL}] 32 $ctrl

		# puts "*************** DCACHE Disabled ***************"
	} else {
		# puts "*************** DCACHE Already Disabled ***************"
	}
}

# Event handler: Target halted (stopped by debugger)
# Disable D-cache to ensure debugger sees correct memory contents
# Aligned with CC35X1E_M33.gel OnHalt()
$_TARGETNAME configure -event halted {
	# puts "*************** HALTED ***************"

	disable_dcache
}

# Event handler: Target about to resume execution
# Re-enable D-cache for optimal performance during execution
# Aligned with CC35X1E_M33.gel OnPreRun()
$_TARGETNAME configure -event resume-start {
	# puts "*************** RESUME START ***************"

	enable_dcache
}

# Event handler: Debugger disconnecting
# Re-enable D-cache to restore normal operation state
# Aligned with CC35X1E_M33.gel OnPreDisconnect()
$_TARGETNAME configure -event gdb-detach {
	# puts "*************** GDB DETACH ***************"

	enable_dcache
}

