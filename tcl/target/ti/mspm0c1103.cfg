#
# Texas Instruments MSPM0C1103 target configuration.
#
# MSPM0C1103 contains 8 KiB main flash and 1 KiB SRAM.  The generic
# target/ti/mspm0.cfg script probes the flash geometry from the factory
# information region, so the only device-specific value required here is
# the conservative 1 KiB working-area size.

if { ![info exists CHIPNAME] } {
	set CHIPNAME mspm0c1103
}

if { ![info exists WORKAREABASE] } {
	set WORKAREABASE 0x20000000
}

if { ![info exists WORKAREASIZE] } {
	set WORKAREASIZE 0x00000400
}

source [find target/ti/mspm0.cfg]
