# CC2341 configuration - reuses CC27xx core setup with CC2341-specific overrides

# Override the chip name for CC2341
if { ![info exists CHIPNAME] } {
	set CHIPNAME cc2341
}

# Source the base CC27xx configuration
source [find target/ti/cc27xx.cfg]
