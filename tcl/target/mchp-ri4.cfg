# Generic native Microchip RI4 target.
# Required before sourcing:
#   MCHP_RI4_PROCESSOR  exact processor name in the scripts XML
#   MCHP_RI4_SCRIPTS    path to the probe firmware scripts.xml/scripts.yaml.gz
# Recommended:
#   MCHP_RI4_FAMILY     family profile name (PIC18, AVR, PIC32MZ, ...)

source [find interface/mchp-ri4.cfg]

if {![info exists MCHP_RI4_PROCESSOR]} {
    error "MCHP_RI4_PROCESSOR must be set before target/mchp-ri4.cfg is sourced"
}
if {![info exists MCHP_RI4_SCRIPTS]} {
    error "MCHP_RI4_SCRIPTS must be set before target/mchp-ri4.cfg is sourced"
}
if {![info exists MCHP_RI4_FAMILY]} { set MCHP_RI4_FAMILY "" }
if {![info exists MCHP_RI4_TOOL_SCRIPTS]} { set MCHP_RI4_TOOL_SCRIPTS "" }
if {![info exists MCHP_RI4_SCRIPT_SUFFIX]} { set MCHP_RI4_SCRIPT_SUFFIX "" }
if {![info exists MCHP_RI4_PC_BYTES]} { set MCHP_RI4_PC_BYTES 4 }
if {![info exists CHIPNAME]} { set CHIPNAME mchp }
if {![info exists TARGETNAME]} { set TARGETNAME $CHIPNAME.cpu }
if {![info exists MCHP_RI4_TAPNAME]} { set MCHP_RI4_TAPNAME bridge }
if {![info exists MCHP_RI4_FLASH_BASE]} { set MCHP_RI4_FLASH_BASE 0 }
if {![info exists MCHP_RI4_FLASH_SIZE]} { set MCHP_RI4_FLASH_SIZE 0 }
if {![info exists MCHP_RI4_ERASE_MODE]} { set MCHP_RI4_ERASE_MODE 0 }

# Current OpenOCD requires -chain-position for every non-DAP target.  This is
# a synthetic, always-enabled TAP: all real traffic goes directly over RI4 USB,
# and interface/mchp-ri4.cfg suppresses JTAG scans.
jtag newtap $CHIPNAME $MCHP_RI4_TAPNAME -irlen 1
set _MCHP_RI4_CHAIN_POSITION $CHIPNAME.$MCHP_RI4_TAPNAME
target create $TARGETNAME mchp_ri4_bridge \
    -endian little \
    -chain-position $_MCHP_RI4_CHAIN_POSITION
mchp_ri4 configure $TARGETNAME \
    -tool $MCHP_RI4_TOOL \
    -vid $MCHP_RI4_VID \
    -pid $MCHP_RI4_PID \
    -family $MCHP_RI4_FAMILY \
    -processor $MCHP_RI4_PROCESSOR \
    -scripts $MCHP_RI4_SCRIPTS \
    -tool-scripts $MCHP_RI4_TOOL_SCRIPTS \
    -script-suffix $MCHP_RI4_SCRIPT_SUFFIX \
    -serial $MCHP_RI4_SERIAL \
    -pc-bytes $MCHP_RI4_PC_BYTES

# Register a standard OpenOCD NOR bank when the device flash size is known.
# RI4 exposes chip erase, so the driver intentionally reports one
# erase block covering the entire bank while allowing arbitrary writes/reads.
if {$MCHP_RI4_FLASH_SIZE > 0} {
    flash bank $CHIPNAME.flash mchp_ri4 \
        $MCHP_RI4_FLASH_BASE $MCHP_RI4_FLASH_SIZE 1 1 $TARGETNAME \
        $MCHP_RI4_ERASE_MODE
}
