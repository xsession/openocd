# SPDX-License-Identifier: GPL-2.0-or-later
# Microchip custom-core target backed by Renode's GDB server.
# Start the Python bridge with: mchp-openocd-bridge --backend renode

if {![info exists MCHP_RENODE_PROCESSOR]} { set MCHP_RENODE_PROCESSOR PIC18 }
if {![info exists MCHP_RENODE_FAMILY]} { set MCHP_RENODE_FAMILY $MCHP_RENODE_PROCESSOR }
if {![info exists MCHP_RENODE_PC_BYTES]} {
    if {[string match -nocase "*PIC16*" $MCHP_RENODE_PROCESSOR] &&
        ![string match -nocase "*PIC18*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_PC_BYTES 2
    } else {
        set MCHP_RENODE_PC_BYTES 4
    }
}
if {![info exists MCHP_RENODE_FLASH_BASE]} {
    if {[string match -nocase "*DSPIC30*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_FLASH_BASE 0x100000
    } else {
        set MCHP_RENODE_FLASH_BASE 0
    }
}
if {![info exists MCHP_RENODE_FLASH_SIZE]} {
    if {[string match -nocase "*PIC16*" $MCHP_RENODE_PROCESSOR] &&
        ![string match -nocase "*PIC18*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_FLASH_SIZE 0x4000
    } elseif {[string match -nocase "*PIC18*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_FLASH_SIZE 0x20000
    } elseif {[string match -nocase "*DSPIC30*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_FLASH_SIZE 0xAC00
    } elseif {[string match -nocase "*DSPIC33*" $MCHP_RENODE_PROCESSOR]} {
        set MCHP_RENODE_FLASH_SIZE 0x40000
    } else {
        error "Unknown Renode custom core '$MCHP_RENODE_PROCESSOR'; set MCHP_RENODE_FLASH_SIZE explicitly"
    }
}
if {![info exists MCHP_RENODE_ERASE_MODE]} { set MCHP_RENODE_ERASE_MODE 0 }

# The C target driver keeps the historical RI4 variable names because both
# hardware and emulation share the same newline-JSON bridge contract.
set MCHP_RI4_TOOL renode
set MCHP_RI4_PROCESSOR $MCHP_RENODE_PROCESSOR
set MCHP_RI4_FAMILY $MCHP_RENODE_FAMILY
set MCHP_RI4_SCRIPTS renode
set MCHP_RI4_PC_BYTES $MCHP_RENODE_PC_BYTES
set MCHP_RI4_FLASH_BASE $MCHP_RENODE_FLASH_BASE
set MCHP_RI4_FLASH_SIZE $MCHP_RENODE_FLASH_SIZE
set MCHP_RI4_ERASE_MODE $MCHP_RENODE_ERASE_MODE

source [find target/mchp-ri4.cfg]
