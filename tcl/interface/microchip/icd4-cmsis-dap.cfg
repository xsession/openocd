#
# MPLAB ICD 4 as a standard CMSIS-DAP adapter.
#
# This applies only when the tool firmware exposes a compatible CMSIS-DAP
# JTAG/SWD endpoint. For PIC/dsPIC ICSP programming use
# programmer/microchip/icd4.cfg instead.

adapter driver cmsis-dap
cmsis_dap_backend hid
adapter usb vid_pid 0x03eb 0x217c
