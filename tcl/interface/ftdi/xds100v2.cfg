#
# Texas Instruments XDS100v2
#
# FT2232H channel A is used for JTAG. Channel B remains available for UART.
# Branded probes use 0403:a6d0; embedded implementations sometimes retain
# the generic FT2232H identity 0403:6010.

adapter driver ftdi
adapter usb vid_pid 0x0403 0xa6d0 0x0403 0x6010
ftdi channel 0
transport select jtag

# Initial GPIO data and direction. PWR_RST starts low here and is raised by
# "ftdi initial_signal" after the first MPSSE GPIO write but before the JTAG
# chain is examined. That low-to-high transition clears the CPLD power-loss
# latch on the first OpenOCD connection.
ftdi layout_init 0x0038 0x597b

#  8000 z - unused
#  4000 0 > CPLD loopback (all target-side pins high-Z)
#  2000 z < !(cable connected)
#  1000 0 > EMU1 output enable
#
#   800 0 > PWR_RST; rising edge clears the power-loss latch
#   400 z < !(power-loss flag)
#   200 z < nSRST
#   100 0 > nSRST output enable
#
#    80 z < RTCK
#    40 0 > EMU0 output enable
#    20 1 > EMU enable
#    10 1 > nTRST
#
#     8 1 > TMS
#     4 z < TDO
#     2 0 > TDI
#     1 0 > TCK

ftdi layout_signal nTRST -data 0x0010
ftdi layout_signal nSRST -oe 0x0100
ftdi layout_signal EMU_EN -data 0x0020
ftdi layout_signal EMU0 -oe 0x0040
ftdi layout_signal EMU1 -oe 0x1000
ftdi layout_signal PWR_RST -data 0x0800
ftdi layout_signal LOOPBACK -data 0x4000

# Apply after the FTDI adapter is open, but before OpenOCD examines the chain.
ftdi initial_signal PWR_RST 1

# Call this after power-cycling only the target while OpenOCD remains running.
proc xds100_recover_after_target_power_cycle {} {
	ftdi set_signal PWR_RST 0
	sleep 1
	ftdi set_signal PWR_RST 1
	jtag arp_init
}
