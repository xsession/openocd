#
# Texas Instruments LAUNCHXL-F28069M LaunchPad.
#
# The onboard XDS100v2 exposes two USB interfaces:
# - interface 0 / channel A: XDS100 Class Debug Port, used for JTAG
# - interface 1 / channel B: XDS100 Class Auxiliary Port, used as UART

source [find interface/ti/xds100v2.cfg]
transport select jtag
adapter speed 1000

source [find target/ti/tms320f28069.cfg]
