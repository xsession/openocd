# Generic XDS100 programmer wrapper.
# Example:
#   openocd -f examples/program-xds100.cfg \
#     -c "set XDS100_INTERFACE interface/ftdi/xds100v2.cfg" \
#     -c "set TARGET_CONFIG target/ti/<device>.cfg" \
#     -c "program firmware.elf verify reset exit"

if {![info exists XDS100_INTERFACE]} {
	set XDS100_INTERFACE interface/ftdi/xds100.cfg
}
if {![info exists TARGET_CONFIG]} {
	error "TARGET_CONFIG is required, for example target/ti/<device>.cfg"
}
if {![info exists XDS100_ADAPTER_SPEED]} {
	set XDS100_ADAPTER_SPEED 1000
}

source [find $XDS100_INTERFACE]
adapter speed $XDS100_ADAPTER_SPEED
source [find $TARGET_CONFIG]
